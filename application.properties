server.port=${SERVER_PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD:Aryan@95}

jwt.secretKey=${JWT_SECRET}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}

# Kafka / Redpanda Cloud
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP}
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${REDPANDA_USERNAME}" password="${REDPANDA_PASSWORD}";

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Trust Gmail's TLS cert — prevents SSLHandshakeException: PKIX path building failed
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# Connection + read + write timeouts (milliseconds) — prevents indefinite blocking
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8
otp.expiry.minutes=10

firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
firebase.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.kafka.enabled=false
spring.jpa.open-in-view=false